<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="https://github.com/Altice-kun/clidhub/blob/main/Clidhub.png">
<title>Downloading — Clidhub</title>
<style>
  :root{
    --bg:#0a0c08;
    --bg-panel:#0f120c;
    --amber:#ffb000;
    --amber-dim:#8a6010;
    --amber-faint:#4a3608;
    --green:#5ad15a;
    --text:#e8dfc9;
    --text-dim:#8a8270;
    --mono:'IBM Plex Mono','SFMono-Regular',Consolas,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    color:var(--text);
    font-family:var(--mono);
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,176,0,0.025) 0px, rgba(255,176,0,0.025) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;
  }
  .term{
    width:520px;
    max-width:92vw;
    background:var(--bg-panel);
    border:1px solid var(--amber-faint);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 20px 60px -20px rgba(255,176,0,.1);
  }
  .term-bar{
    display:flex;align-items:center;gap:8px;
    padding:10px 14px;
    border-bottom:1px solid var(--amber-faint);
    background:#0c0e09;
  }
  .dotc{width:10px;height:10px;border-radius:50%;}
  .r{background:#5a2c2c;} .y{background:#5a4a1a;} .g{background:#2a4a2a;}
  .term-bar .title{margin-left:8px;color:var(--text-dim);font-size:12px;}
  .term-body{padding:24px 22px;font-size:13.5px;min-height:160px;}
  .ln{margin:0 0 6px;white-space:pre-wrap;}
  .prompt{color:var(--green);}
  .out{color:var(--text-dim);}
  .ok{color:var(--green);}
  .bar-wrap{margin:16px 0;background:var(--amber-faint);height:6px;border-radius:3px;overflow:hidden;}
  .bar{height:100%;width:0%;background:var(--amber);transition:width 1.1s ease;}
  .done{display:none;}
  .done.show{display:block;}
  .back{
    display:inline-block;margin-top:18px;color:var(--amber);text-decoration:none;font-size:13px;
    border:1px solid var(--amber-dim);padding:8px 14px;border-radius:3px;
  }
  .back:hover{background:var(--amber-faint);}
  .manual{margin-top:14px;font-size:12px;color:var(--text-dim);}
  .manual a{color:var(--amber);}
</style>
</head>
<body>
  <div class="term">
    <div class="term-bar">
      <span class="dotc r"></span><span class="dotc y"></span><span class="dotc g"></span>
      <span class="title">clidhub — download</span>
    </div>
    <div class="term-body">
      <p class="ln"><span class="prompt">$</span> curl -OL clidhub.skill</p>
      <p class="ln out" id="status">Downloading clidhub.skill ...</p>
      <div class="bar-wrap"><div class="bar" id="bar"></div></div>

      <div class="done" id="done">
        <p class="ln ok">✓ download complete — clidhub.skill</p>
        <p class="ln out">Claudeに .skill ファイルをアップロードしてインストールしてください。</p>
        <a class="back" href="index.html">← トップに戻る</a>
        <p class="manual">ダウンロードが始まらない場合は <a href="files/clidhub.skill" download>こちらを直接クリック</a> してください。</p>
      </div>
    </div>
  </div>

<script>
  // 実ファイルへのダウンロードを開始
  const fileUrl = "files/clidhub.skill";
  const a = document.createElement('a');
  a.href = fileUrl;
  a.download = "clidhub.skill";
  document.body.appendChild(a);
  a.click();

  // 演出: プログレスバーが進んで完了表示に切り替わる
  requestAnimationFrame(() => {
    document.getElementById('bar').style.width = '100%';
  });
  setTimeout(() => {
    document.getElementById('status').textContent = 'clidhub.skill (8.8 KB) downloaded.';
    document.getElementById('done').classList.add('show');
  }, 1200);
</script>
</body>
</html>
